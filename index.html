<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">다크 모드로 전환</button>
    </div>
    <div class="container">
        <h1>오늘의 추천 로또 번호</h1>
        <p class="description">마음에 드는 번호를 클릭하여 선택해보세요!</p>
        
        <button id="recommend-btn">번호 추천받기</button>
        
        <div id="recommendation-results" class="recommendation-results">
            <!-- 추천된 5개 세트가 여기에 표시됩니다 -->
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
