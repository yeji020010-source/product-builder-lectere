<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 당첨 번호 확인기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">다크 모드로 전환</button>
    </div>
    <div class="container">
        <h1>로또 당첨 번호 확인기</h1>
        <div class="user-inputs">
            <input type="number" class="user-number" min="1" max="45">
            <input type="number" class="user-number" min="1" max="45">
            <input type="number" class="user-number" min="1" max="45">
            <input type="number" class="user-number" min="1" max="45">
            <input type="number" class="user-number" min="1" max="45">
            <input type="number" class="user-number" min="1" max="45">
        </div>
        <button id="check-btn">당첨 번호 확인</button>
        <div class="results">
            <h2>당첨 번호</h2>
            <div class="winning-numbers-display"></div>
            <h2>결과</h2>
            <p id="result-message"></p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
